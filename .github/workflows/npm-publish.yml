name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          PREVIOUS_VERSION=""

          if [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            PREVIOUS_VERSION="$(git show "$BEFORE_SHA:package.json" 2>/dev/null | node -p "const fs=require('fs'); const data=fs.readFileSync(0, 'utf8'); data ? JSON.parse(data).version ?? '' : ''" || true)"
          fi

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Check npm token
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM_TOKEN GitHub Actions secret."
            exit 1
          fi

      - name: Publish package
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
